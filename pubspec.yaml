name: ev_a
description: A mobile app for EV parking with a Dart backend and MongoDB.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.10.7 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shelf: ^1.4.2
  shelf_router: ^1.1.2
  shelf_cors_headers: ^0.1.5
  mongo_dart: ^0.8.1
  crypto: ^3.0.3
  http: ^1.2.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  fl_chart: ^0.66.0
  provider: ^6.1.1
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^6.0.0
  test: ^1.25.6
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    backgroundColor: "#2DBE44"
    themeColor: "#2DBE44"
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#2DBE44"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
